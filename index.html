function getEventIndex(){
  const idx = {};
  for(const r of ST.rows){
    const c=(r.event||'').toUpperCase();
    if(!c||c==='DIRECT'||c==='LIVE') continue;
    if(!idx[c]) idx[c]={code:c,matchCount:0,playedCount:0};
    idx[c].matchCount++;
    if(r.rtot!==undefined&&r.rtot!==null) idx[c].playedCount++;
  }
  return Object.values(idx).sort((a,b)=>a.code.localeCompare(b.code));
}

function renderEventTab(){
  const root = document.getElementById('tab-event');
  if(!ST.loaded){ root.innerHTML=`<div class="loading-wrap"><div class="spinner"></div><div>Loading…</div></div>`; return; }
  const events = getEventIndex();
  const detailH = ST.eventData?renderEventDetail(ST.eventData):`<div class="empty">← Select an event to view matches</div>`;
  root.innerHTML = `
    <div class="page-title">Event Browser</div>
    <div class="page-desc">Browse all events with EPA-based match predictions</div>
    <div class="event-browser" style="margin-top:8px">
      <div class="event-list-panel">
        <div class="event-search"><input placeholder="Filter events…" value="${evSearch}" oninput="evSearch=this.value.toUpperCase();refreshEvList()" autocomplete="off"></div>
        <div class="event-list-items" id="event-list-items">${eventListH(events)}</div>
      </div>
      <div id="event-detail-panel">${detailH}</div>
    </div>`;
}

function eventListH(events){
  const filtered = evSearch?events.filter(e=>e.code.includes(evSearch)):events;
  if(!filtered.length) return `<div class="empty" style="padding:16px;font-size:11px">No events match.</div>`;
  return filtered.map(e=>`
    <div class="event-item${ST.eventData&&ST.eventData.code===e.code?' active':''}" onclick="selectEvent('${e.code}')">
      <div class="ev-code">${e.code}</div>
      <div class="ev-count">${e.playedCount}/${e.matchCount} played · ${extractRegion(e.code)}</div>
    </div>`).join('');
}

function refreshEvList(){ const el=document.getElementById('event-list-items'); if(el) el.innerHTML=eventListH(getEventIndex()); }

function selectEvent(code){
  const eventRows = ST.rows.filter(r=>(r.event||'').toUpperCase()===code);
  if(!eventRows.length) return;
  const rows = eventRows.map(r=>({...r,played:r.rtot!==undefined&&r.rtot!==null}))
    .sort((a,b)=>(a.mt||'').localeCompare(b.mt||''));
  const snap = ST.preEventEpas[code]||{};
  let correct=0,total=0;
  for(const row of rows){
    if(!row.played||row.rtot===row.btot) continue;
    const rwp    = epaWinProb(row.rt, row.bt, snap, ST.seasonAvg, ST.penaltyRatings);
    const winner = rwp>0.5?'red':'blue';
    const actual = row.rtot>row.btot?'red':'blue';
    if(winner===actual) correct++;
    total++;
  }
  ST.eventData = {code, rows, correct, total};
  const dp = document.getElementById('event-detail-panel');
  if(dp) dp.innerHTML = renderEventDetail(ST.eventData);
  document.querySelectorAll('.event-item').forEach(el=>{
    el.classList.toggle('active', el.querySelector('.ev-code')?.textContent===code);
  });
}

function renderEventDetail(data){
  const {code,rows,correct,total} = data;
  const played  = rows.filter(r=>r.played).length;
  const pending = rows.length-played;
  const acc     = total>0?Math.round(correct/total*100):null;
  const snap    = ST.preEventEpas[code]||{};
  const region  = extractRegion(code);
  const regAvg  = ST.regionEarlyAvg[region];
  return `
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat-card"><div class="sc-label">Event</div><div class="sc-val blue" style="font-size:16px">${code}</div><div class="sc-sub">Region: ${region}${regAvg?` · avg ${regAvg.toFixed(1)}`:''}  </div></div>
      <div class="stat-card"><div class="sc-label">Matches</div><div class="sc-val">${rows.length}</div><div class="sc-sub">${played} played · ${pending} pending</div></div>
      ${acc!==null?`<div class="stat-card"><div class="sc-label">Pred. Accuracy</div><div class="sc-val ${acc>=70?'green':acc>=55?'blue':'orange'}">${acc}%</div><div class="sc-sub">${correct}/${total} · regional prior</div></div>`:''}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div class="section-title">Matches</div>
      <div class="mono dim" style="font-size:10px">✓ correct &nbsp;✗ wrong &nbsp;— pending</div>
    </div>
    ${rows.map((row,i)=>matchRowH(row,i+1,snap)).join('')}`;
}

function matchRowH(row, idx, snap){
  const rwp        = epaWinProb(row.rt, row.bt, snap, ST.seasonAvg, ST.penaltyRatings);
  const predWinner = rwp>0.5?'red':'blue';
  const rb         = Math.round(rwp*100);
  const played     = row.played||(row.rtot!==undefined&&(row.rtot>0||row.btot>0));
  let actualWinner = null;
  if(played){
    if(row.rtot!==undefined&&row.btot!==undefined) actualWinner=row.rtot>row.btot?'red':row.btot>row.rtot?'blue':'tie';
    else if(row.won===1) actualWinner='red';
    else if(row.won===0) actualWinner='blue';
  }
  const predCorrect = actualWinner?(predWinner===actualWinner||actualWinner==='tie'):null;
  const checkH = predCorrect===null?`<span class="check-tbd">—</span>`:predCorrect?`<span class="check-ok">✓</span>`:`<span class="check-no">✗</span>`;
  const statusBadge = played?`<span class="status-badge badge-played">PLAYED</span>`:`<span class="status-badge badge-pending">SCHED</span>`;
  const scoreH = played&&row.rtot!==undefined
    ?`<div class="mr-score-val mono"><span style="color:var(--red)">${row.rtot}</span><span class="dim"> – </span><span style="color:var(--accent2)">${row.btot}</span></div>`
    :`<div class="mr-score-val mono dim">TBD</div>`;
  return `<div class="match-row">
    <div class="mr-num">${idx}</div>
    <div class="mr-alliances">
      <div class="mr-alliance"><div class="mr-dot red"></div><div class="mr-teams">${row.rt.join(' ')}</div>${statusBadge}</div>
      <div class="mr-alliance"><div class="mr-dot blue"></div><div class="mr-teams">${row.bt.join(' ')}</div></div>
    </div>
    <div class="mr-pred">
      <div class="mr-pred-lbl">Prediction</div>
      <div class="mr-pred-val" style="color:${predWinner==='red'?'var(--red)':'var(--accent2)'}">${predWinner.toUpperCase()}</div>
      <div class="mr-wbar"><div class="wr" style="width:${rb}%"></div><div class="wb" style="width:${100-rb}%"></div></div>
      <div class="mono dim" style="font-size:9px">${rb}% red</div>
    </div>
    <div class="mr-result">
      <div class="mr-result-lbl">Result</div>
      ${scoreH}
    </div>
    <div class="mr-check">${checkH}</div>
  </div>`;
}

function renderPredRankTab(){
  const root = document.getElementById('tab-predrank');
  if(!ST.loaded){ root.innerHTML=`<div class="loading-wrap"><div class="spinner"></div><div>Loading…</div></div>`; return; }
  const events = getEventIndex();
  const sel    = ST.predRankEvent;
  root.innerHTML = `
    <div class="page-title">Predictive Rankings</div>
    <div class="page-desc">Pre-tournament seeding using regional-prior EPA snapshots · Momentum-blended EPA · Calibrated Elo scale</div>
    <div class="filter-row" style="margin-bottom:16px">
      <select class="select" style="min-width:300px" onchange="ST.predRankEvent=this.value;renderPredRankTab()">
        <option value="">— Select an event —</option>
        ${events.map(e=>`<option value="${e.code}" ${e.code===sel?'selected':''}>${e.code} (${e.matchCount} matches)</option>`).join('')}
      </select>
    </div>
    <div id="predrank-content">${sel?predRankTableH(sel):`<div class="empty">Select an event to view predictive rankings.</div>`}</div>`;
}

function predRankTableH(code){
  const allEventRows = ST.rows.filter(r=>(r.event||'').toUpperCase()===code);
  if(!allEventRows.length) return `<div class="empty">No match data for ${code}.</div>`;
  const isQual = r=>{ const lv=(r.level||'').toLowerCase(); return lv===''||lv==='qual'||lv==='qualification'; };
  const eventRows = allEventRows.filter(isQual);
  if(!eventRows.length) return `<div class="empty">No qualification matches found for ${code}.</div>`;

  const snap = ST.preEventEpas[code]||{};
  const smartEpa = t => snap[t]!==undefined ? snap[t] : regionalFallback(t, ST.seasonAvg);

  const teamSet = new Set();
  for(const r of eventRows){ r.rt.forEach(t=>teamSet.add(t)); r.bt.forEach(t=>teamSet.add(t)); }

  const isRegChamp = /CMP|RCMP|RC\d/.test(code.toUpperCase());
  const movThresh  = isRegChamp ? 21 : 16;
  const goalThresh = isRegChamp ? 42 : 36;
  const patThresh  = isRegChamp ? 22 : 18;
  const parkThresh = isRegChamp ? 6  : 4;

  const snapPatEpa  = t => ST.patternRatings[t]  ?? (smartEpa(t) * PATTERN_PRIOR_FRAC);
  const snapParkEpa = t => ST.parkRatings[t]      ?? (smartEpa(t) * PARK_PRIOR_FRAC);
  const snapAutoEpa = t => ST.autoRatings[t]      ?? (smartEpa(t) * AUTO_PRIOR_FRAC);

  const matchPreds = eventRows.map(row => {
    const snapSmart = {...snap};
    for(const t of [...row.rt,...row.bt]) if(snapSmart[t]===undefined) snapSmart[t]=smartEpa(t);

    const rwp = epaWinProb(row.rt, row.bt, snapSmart, ST.seasonAvg, ST.penaltyRatings, ST.autoStability);
    const predWinner = rwp > 0.5 ? 'red' : 'blue';
    const isToss     = rwp >= 0.45 && rwp <= 0.55;

    const rSum = row.rt.reduce((s,t)=>s+(snapSmart[t]??smartEpa(t)),0);
    const bSum = row.bt.reduce((s,t)=>s+(snapSmart[t]??smartEpa(t)),0);

    const rAutoSum = row.rt.reduce((s,t)=>s+snapAutoEpa(t), 0);
    const bAutoSum = row.bt.reduce((s,t)=>s+snapAutoEpa(t), 0);

    const rPatSum  = row.rt.reduce((s,t)=>s+snapPatEpa(t),  0);
    const bPatSum  = row.bt.reduce((s,t)=>s+snapPatEpa(t),  0);
    const rPat     = rPatSum >= patThresh  ? 1 : 0;
    const bPat     = bPatSum >= patThresh  ? 1 : 0;

    const rParkSum = row.rt.reduce((s,t)=>s+snapParkEpa(t), 0);
    const bParkSum = row.bt.reduce((s,t)=>s+snapParkEpa(t), 0);
    const rPark    = rParkSum >= parkThresh ? 1 : 0;
    const bPark    = bParkSum >= parkThresh ? 1 : 0;

    const rMov  = rAutoSum * 2 >= movThresh ? 1 : 0;
    const bMov  = bAutoSum * 2 >= movThresh ? 1 : 0;

    const rGoal = rSum >= goalThresh ? 1 : 0;
    const bGoal = bSum >= goalThresh ? 1 : 0;

    const rWinRP = isToss ? 1 : (predWinner==='red' ? 3 : 0);
    const bWinRP = isToss ? 1 : (predWinner==='blue'? 3 : 0);

    return {
      row, rwp, predWinner,
      rPredRP: rWinRP + rMov + rGoal + rPat + rPark,
      bPredRP: bWinRP + bMov + bGoal + bPat + bPark,
      rAutoEst: rAutoSum, bAutoEst: bAutoSum,
    };
  });

  const teamStats = {};
  for(const t of teamSet) teamStats[t] = {
    team:t, preEpa:smartEpa(t),
    predRpTotal:0, predMatchCount:0, predAutoSum:0,
    predWins:0, predLosses:0,
    played:0, wins:0, losses:0, ties:0,
    actualRpTotal:0, actualAutoSum:0,
    correct:0,
  };

  let globalCorrect=0, globalTotal=0;

  for(const {row, rwp, predWinner, rPredRP, bPredRP, rAutoEst, bAutoEst} of matchPreds){
    const played = row.rtot !== undefined && row.rtot !== null;

    for(const t of row.rt){ if(teamStats[t]){
      teamStats[t].predRpTotal   += rPredRP;
      teamStats[t].predMatchCount++;
      teamStats[t].predAutoSum   += rAutoEst;
      if(predWinner==='red') teamStats[t].predWins++; else teamStats[t].predLosses++;
    }}
    for(const t of row.bt){ if(teamStats[t]){
      teamStats[t].predRpTotal   += bPredRP;
      teamStats[t].predMatchCount++;
      teamStats[t].predAutoSum   += bAutoEst;
      if(predWinner==='blue') teamStats[t].predWins++; else teamStats[t].predLosses++;
    }}

    if(!played) continue;

    const actual  = row.rtot > row.btot ? 'red' : row.btot > row.rtot ? 'blue' : 'tie';
    const correct = (actual !== 'tie') && (predWinner === actual);
    if(actual !== 'tie'){ if(correct) globalCorrect++; globalTotal++; }

    const rActWinRP = actual==='red' ? 3 : actual==='tie' ? 1 : 0;
    const bActWinRP = actual==='blue'? 3 : actual==='tie' ? 1 : 0;
    const rMilRP = (row.rMovRP??0) + (row.rGoalRP??0) + (row.rPatRP??0);
    const bMilRP = (row.bMovRP??0) + (row.bGoalRP??0) + (row.bPatRP??0);
    const rActRP = rActWinRP + rMilRP;
    const bActRP = bActWinRP + bMilRP;

    for(const t of row.rt){ if(teamStats[t]){
      teamStats[t].played++;
      teamStats[t].actualRpTotal += rActRP;
      teamStats[t].actualAutoSum += (row.ra||0) / (row.rt.length||1);
      if(actual==='red'){ teamStats[t].wins++; if(correct) teamStats[t].correct++; }
      else if(actual==='tie') teamStats[t].ties++;
      else teamStats[t].losses++;
    }}
    for(const t of row.bt){ if(teamStats[t]){
      teamStats[t].played++;
      teamStats[t].actualRpTotal += bActRP;
      teamStats[t].actualAutoSum += (row.ba||0) / (row.bt.length||1);
      if(actual==='blue'){ teamStats[t].wins++; if(correct) teamStats[t].correct++; }
      else if(actual==='tie') teamStats[t].ties++;
      else teamStats[t].losses++;
    }}
  }

  const acc        = globalTotal>0 ? Math.round(globalCorrect/globalTotal*100) : null;
  const playedCount= eventRows.filter(r=>r.rtot!==undefined&&r.rtot!==null).length;
  const hasPlayed  = playedCount > 0;

  const allTeams = Object.values(teamStats).sort((a,b) => {
    const aAvg = a.predMatchCount ? a.predRpTotal/a.predMatchCount : 0;
    const bAvg = b.predMatchCount ? b.predRpTotal/b.predMatchCount : 0;
    if(Math.abs(aAvg-bAvg) > 0.001) return bAvg-aAvg;
    return b.predAutoSum - a.predAutoSum;
  });

  const region = extractRegion(code);
  const regAvg = ST.regionEarlyAvg[region];
  return `
    <div class="stat-grid" style="margin-bottom:14px">
      <div class="stat-card"><div class="sc-label">Event</div><div class="sc-val blue" style="font-size:16px">${code}</div><div class="sc-sub">${teamSet.size} teams · ${region}${regAvg?` avg ${regAvg.toFixed(1)}`:''}</div></div>
      <div class="stat-card"><div class="sc-label">Qual Matches</div><div class="sc-val">${eventRows.length}</div><div class="sc-sub">${playedCount} played</div></div>
      ${acc!==null?`<div class="stat-card"><div class="sc-label">Pred. Accuracy</div><div class="sc-val ${acc>=75?'green':acc>=60?'blue':'orange'}">${acc}%</div><div class="sc-sub">${globalCorrect}/${globalTotal} · calibrated Elo</div></div>`:''}
      <div class="stat-card"><div class="sc-label">Top Pre-EPA</div><div class="sc-val green">${allTeams.length?Math.max(...allTeams.map(t=>t.preEpa)).toFixed(1):'—'}</div><div class="sc-sub">entering tournament</div></div>
    </div>
    <div class="info-box" style="margin-bottom:12px">
      📊 <strong>Ranking Points</strong> — Up to <strong>7 RP/match</strong>:
      Win <strong>(3)</strong> or Tie (1) + Movement RP + Goal RP + Pattern RP + Park RP.
      Pattern &amp; Park RPs predicted from dedicated sub-EPAs trained on those specific point sources.
      Thresholds: Movement ${movThresh} · Goal ${goalThresh} · Pattern ${patThresh} · Park ${parkThresh}.
    </div>
    <div class="section-header">
      <div class="section-title">Predicted Rankings</div>
      <div class="section-sub">Sorted by pred avg RP · actual RP shown when available · TBP1: cumulative auto pts</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>#</th><th>Team</th><th>Pre-Event EPA</th><th>Tier</th>
          <th>Pred Avg RP</th>
          ${hasPlayed?`<th>Actual Avg RP</th>`:''}
          <th>Pred W–L</th>
          ${hasPlayed?`<th>Actual W–L</th><th>Match Acc.</th>`:''}
        </tr></thead>
        <tbody>${allTeams.map((t,i)=>{
          const u   = toU(t.preEpa, ST.seasonAvg);
          const lbl = uepaLabel(u);

          const predAvgRp = t.predMatchCount ? (t.predRpTotal / t.predMatchCount).toFixed(2) : '—';
          const predRpVal = parseFloat(predAvgRp)||0;
          const predRpColor = predRpVal>=4.5?'var(--green)':predRpVal>=3?'var(--accent2)':predRpVal>=1.5?'var(--yellow)':'var(--text2)';

          const actAvgRp = hasPlayed && t.played>0
            ? (t.actualRpTotal / t.played).toFixed(2) : null;
          const actRpVal = parseFloat(actAvgRp)||0;
          const actRpColor = actRpVal>=4.5?'var(--green)':actRpVal>=3?'var(--accent2)':actRpVal>=1.5?'var(--yellow)':'var(--text2)';

          const accCell = t.played>0
            ? `<td class="mono" style="color:${t.correct/t.played>=.65?'var(--green)':t.correct/t.played>=.5?'var(--accent2)':'var(--orange)'}">${Math.round(t.correct/t.played*100)}% <span class="dim">(${t.correct}/${t.played})</span></td>`
            : `<td class="mono dim">—</td>`;
          const actualWL = hasPlayed ? `<td class="mono">${t.wins}–${t.losses}${t.ties>0?`–${t.ties}`:''}</td>` : '';
          const actRpCell = hasPlayed
            ? `<td class="mono" style="font-weight:600;color:${actRpColor}">${actAvgRp??'—'}</td>`
            : '';

          return `<tr onclick="goTeam(${t.team})">
            <td class="mono dim">${i+1}</td>
            <td class="mono" style="font-weight:700;color:var(--accent2)">${t.team}</td>
            <td class="mono" style="font-weight:600">${t.preEpa.toFixed(1)}</td>
            <td><span class="tier ${tierCls(lbl)}">${lbl}</span></td>
            <td class="mono" style="font-weight:700;color:${predRpColor}">${predAvgRp}</td>
            ${actRpCell}
            <td class="mono" style="color:var(--accent2)">${t.predWins}–${t.predLosses}</td>
            ${actualWL}${hasPlayed?accCell:''}
          </tr>`;
        }).join('')}</tbody>
      </table>
    </div>`;
}

// ═══════════════════════════════════════════════════════════

loadData(false, TARGET_SEASON);
</script>
